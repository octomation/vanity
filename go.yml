    import: { url: https://github.com/octolab/protocol, vcs: git }
    source: { url: '{{.Import.URL}}', dir: '{{.URL}}/tree/master{/dir}', file: '{{.Dir}}/{file}#L{line}' }
    tags: [octolab, toolkit, go, protocol, http, rest, rpc, grpc]
    skip: true

