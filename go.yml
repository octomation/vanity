modules:
  
  # mapping:
  # - prefix -> metaImport.Prefix (cmd/go/internal/get/vcs.go)
  # - import.url -> metaImport.RepoRoot (cmd/go/internal/get/vcs.go)
  # - import.vcs -> metaImport.VCS (cmd/go/internal/get/vcs.go)

  - prefix: go.octolab.org
    import: { url: https://github.com/octolab/pkg, vcs: git }
    source: { url: '{{.Import.URL}}', dir: '{{.URL}}/tree/master{/dir}', file: '{{.Dir}}/{file}#L{line}' }
    tags: [octolab, toolkit, go]

  - prefix: go.octolab.org/toolkit/cli
    import: { url: https://github.com/octolab/cli, vcs: git }
    source: { url: '{{.Import.URL}}', dir: '{{.URL}}/tree/master{/dir}', file: '{{.Dir}}/{file}#L{line}' }
    tags: [octolab, toolkit, go, cli]
  
