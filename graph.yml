---

- prefix: go.octolab.org
  import:
    - url: https://github.com/octolab/pkg
      vcs: git
      source:
        url:  '{{.Import.URL}}'
        dir:  '{{.URL}}/tree/master{/dir}'
        file: '{{.Dir}}/{file}#L{line}'
  packages:
    - go.octolab.org/errors
    - go.octolab.org/fn
    - go.octolab.org/fn/timer
    - go.octolab.org/io
    - go.octolab.org/pointer
    - go.octolab.org/runtime
    - go.octolab.org/safe
    - go.octolab.org/sequence
    - go.octolab.org/strings
    - go.octolab.org/sync
    - go.octolab.org/unsafe
  tags: [go, toolkit, octolab]

